
spring.application.name=biblioteca-cef02

# Banco H2 salvando em ARQUIVO (Caminho relativo à raiz do projeto)
# O AUTO_SERVER=TRUE permite que o Spring e o H2 Console acessem o arquivo juntos
spring.datasource.url=jdbc:h2:file:./data/bibliotecadb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- CONFIGURAÇÃO PARA CARREGAMENTO AUTOMÁTICO DE DADOS ---
# "always" executa o arquivo import.sql (ou data.sql) toda vez que o app sobe
spring.sql.init.mode=always

# Console do H2 - Acesso: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Correção para a tela branca/404 no console
spring.security.headers.frame-options=sameorigin

# JPA e Hibernate
# 'update' cria as tabelas se não existirem e mantém os dados
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Garante que o Hibernate não interfira no script de inicialização do Spring
spring.jpa.defer-datasource-initialization=true
